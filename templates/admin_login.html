<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | AgnesNav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/stitch.css') }}">
</head>
<body class="admin-login-body">
  <div class="admin-login-wrap">
    <div class="admin-login-logo">
      <div class="brand-mark">A</div>
      <div>
        <p class="admin-login-brand">AgnesNav</p>
        <p class="admin-login-sub">Admin Control Panel</p>
      </div>
    </div>

    <div class="admin-login-card">
      <div class="admin-login-card-head">
        <div class="admin-lock-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="admin-login-title">Welcome back</h1>
        <p class="admin-login-hint">Sign in to manage the campus navigation system</p>
      </div>

      {% if error %}
        <div class="admin-error-banner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ error }}
        </div>
      {% endif %}

      <form class="admin-login-form" method="post" action="{{ url_for('admin_login') }}">
        <div class="admin-field">
          <label for="username">Username</label>
          <div class="admin-input-wrap">
            <svg class="admin-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required>
          </div>
        </div>

        <div class="admin-field">
          <label for="password">Password</label>
          <div class="admin-input-wrap">
            <svg class="admin-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
            <button type="button" class="toggle-pw-btn" onclick="togglePw()" title="Show/Hide">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="admin-login-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In to Admin Panel
        </button>
      </form>

      <p class="admin-login-footer-note">
        <a href="{{ url_for('index') }}">← Back to campus map</a>
      </p>
    </div>

    <p class="admin-login-copyright">Agnes College Navigation System &copy; 2025</p>
  </div>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
